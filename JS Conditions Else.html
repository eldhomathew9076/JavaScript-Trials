<!DOCTYPE html>
<html>
<body>
<h1>JS If-Else Trial </h1>

<p>Age Classification:</p>

<p id="trial"></p>

<script>
let age =65
let message;
if (age < 18) {
  message = "Minor";
} else {
  message = "Major";
}

document.getElementById("trial").innerHTML = message;
</script>

</body>
</html>
